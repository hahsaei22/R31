<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>جدول الورديات السنوي</title>
<style>
body{margin:0;font-family:Tahoma,Arial;background:#f4f8f7}
header{background:linear-gradient(135deg,#007a53,#00a99d);color:#fff;padding:18px}
.container{padding:12px;max-width:900px;margin:auto}
.card,.month{background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card{padding:12px;margin-bottom:12px}
.controls{display:flex;flex-direction:column;gap:8px}
select,button{padding:12px;border-radius:10px;border:1px solid #ddd}
button{background:#007a53;color:#fff;border:none}
.month{padding:10px;margin-bottom:14px}
.month h3{text-align:center;color:#007a53;margin:5px 0 10px}
.weekdays,.days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.weekdays div{font-size:11px;font-weight:bold;text-align:center;background:#e8f5f2;padding:6px;border-radius:6px}
.day{min-height:48px;padding:3px;border-radius:6px;font-size:10px;text-align:center}
.work{background:#00a651;color:#fff}
.off3{background:#f39c12;color:#fff}
.off4{background:#1e88e5;color:#fff}
.empty{background:transparent}
footer{text-align:center;padding:20px;color:#555}
.legend span{display:inline-block;margin:2px;padding:6px 10px;color:#fff;border-radius:8px;font-size:12px}
</style>
</head>
<body>
<header>
<h2>جدول الورديات 7/3 - 7/4</h2>
<div>عرض متوافق مع الجوال</div>
</header>

<div class="container">
<div class="card">
<div class="controls">
<select id="group" onchange="renderYear()">
<option value="A">Group A</option>
<option value="B">Group B</option>
<option value="C">Group C</option>
</select>

<select id="year" onchange="renderYear()">
<option>2026</option>
<option>2027</option>
<option>2028</option>
</select>

<button onclick="window.print()">طباعة PDF</button>
</div>

<div class="legend" style="margin-top:10px">
<span style="background:#00a651">دوام</span>
<span style="background:#f39c12">أوف 3</span>
<span style="background:#1e88e5">أوف 4</span>
</div>
</div>

<div id="calendar"></div>

<footer>
Designed by<br>
<b>HASSAN AL AHSAEI</b><br>
@AHSAEIHM
</footer>
</div>

<script>
const cycle=["W","W","W","W","W","W","W","O3","O3","O3","W","W","W","W","W","W","W","O4","O4","O4","O4"];
const anchorA=new Date(2026,5,4);
const anchorB=new Date(2026,5,4);
const anchorC=new Date(2026,5,7);

function diff(a,b){return Math.floor((a-b)/86400000);}
function state(date,anchor,start){
 let d=diff(date,anchor);
 let i=((start+d)%21+21)%21;
 return cycle[i];
}
function getState(date,g){
 if(g==="A") return state(date,anchorA,7);
 if(g==="B") return state(date,anchorB,0);
 return state(date,anchorC,17);
}
function cls(s){return s==="W"?"work":(s==="O3"?"off3":"off4");}
function txt(s){return s==="W"?"د":(s==="O3"?"3":"4");}

function renderYear(){
 const year=parseInt(document.getElementById("year").value);
 const group=document.getElementById("group").value;
 const months=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
 const daysNames=["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
 const cal=document.getElementById("calendar");
 cal.innerHTML='';

 for(let m=0;m<12;m++){
   let first=new Date(year,m,1);
   let last=new Date(year,m+1,0).getDate();

   let html='<div class="month"><h3>'+months[m]+'</h3>';
   html+='<div class="weekdays">';
   daysNames.forEach(d=>html+='<div>'+d+'</div>');
   html+='</div><div class="days">';

   for(let i=0;i<first.getDay();i++){
      html+='<div class="day empty"></div>';
   }

   for(let d=1;d<=last;d++){
      let date=new Date(year,m,d);
      let s=getState(date,group);
      html+='<div class="day '+cls(s)+'">'+d+'<br>'+txt(s)+'</div>';
   }

   html+='</div></div>';
   cal.innerHTML+=html;
 }
}
renderYear();
</script>
</body>
</html>
